{% extends "layouts/auth.html" %}


{% block title %}

Login | DealHunterAI

{% endblock %}


{% block content %}


<div class="mb-4">

    <h3 class="auth-title">
        Welcome Back 👋
    </h3>

    <p class="auth-subtitle mb-0">
        Login to continue tracking smarter deals.
    </p>

</div>


<!-- ======================================================
     GOOGLE LOGIN
====================================================== -->

<div class="d-grid mb-4">

    <a
        href="{{ url_for('google_login') }}"
        class="btn btn-outline-dark auth-btn"
    >

        <i class="bi bi-google me-2"></i>

        Continue with Google

    </a>

</div>


<!-- ======================================================
     DIVIDER
====================================================== -->

<div class="d-flex align-items-center mb-4">

    <hr class="flex-grow-1">

    <span class="px-3 text-muted">
        OR
    </span>

    <hr class="flex-grow-1">

</div>


<!-- ======================================================
     LOGIN FORM
====================================================== -->

<form method="POST">


    <div class="mb-3">

        <label class="form-label fw-semibold">
            Email Address
        </label>

        <input
            class="form-control"
            name="email"
            type="email"
            placeholder="Enter your email"
            autocomplete="email"
            required
        >

    </div>


    <div class="mb-4">

        <label class="form-label fw-semibold">
            Password
        </label>

        <input
            class="form-control"
            name="password"
            type="password"
            placeholder="Enter your password"
            autocomplete="current-password"
            required
        >

    </div>


    <div class="d-grid">

        <button
            type="submit"
            class="btn btn-primary auth-btn"
        >

            <i class="bi bi-box-arrow-in-right me-2"></i>

            Login

        </button>

    </div>


</form>


<!-- ======================================================
     REGISTER LINK
====================================================== -->

<div class="text-center mt-4">

    <span class="text-muted">
        New to DealHunterAI?
    </span>

    <a
        href="{{ url_for('register') }}"
        class="auth-link"
    >
        Create Account
    </a>

</div>


<!-- ======================================================
     SECURITY MESSAGE
====================================================== -->

<p class="security-text mt-4 mb-0">

    <i class="bi bi-shield-lock me-1"></i>

    Your account information is securely protected.

</p>


{% endblock %}
