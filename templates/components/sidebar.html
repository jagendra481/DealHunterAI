<div class="col-lg-2 col-md-3 sidebar">

    <!-- Logo -->
    <div class="logo">

        <h3>
            🚀 DealHunterAI
        </h3>

    </div>


    <!-- Navigation -->
    <div class="menu">

        <a href="{{ url_for('dashboard') }}"
           class="menu-item {% if request.endpoint == 'dashboard' %}active{% endif %}">

            <i class="bi bi-grid-1x2-fill"></i>

            <span>Dashboard</span>

        </a>


        <a href="{{ url_for('products') }}"
           class="menu-item {% if request.endpoint == 'products' %}active{% endif %}">

            <i class="bi bi-box-seam-fill"></i>

            <span>Products</span>

        </a>


        <a href="{{ url_for('add_product') }}"
           class="menu-item {% if request.endpoint == 'add_product' %}active{% endif %}">

            <i class="bi bi-plus-circle-fill"></i>

            <span>Add Product</span>

        </a>


        <a href="{{ url_for('analytics') }}"
           class="menu-item {% if request.endpoint == 'analytics' %}active{% endif %}">

            <i class="bi bi-bar-chart-fill"></i>

            <span>Analytics</span>

        </a>


        <a href="{{ url_for('alerts') }}"
           class="menu-item {% if request.endpoint == 'alerts' %}active{% endif %}">

            <i class="bi bi-bell-fill"></i>

            <span>Alerts</span>

        </a>


        <a href="{{ url_for('profile') }}"
           class="menu-item {% if request.endpoint == 'profile' %}active{% endif %}">

            <i class="bi bi-person-circle"></i>

            <span>Profile</span>

        </a>


        <a href="{{ url_for('settings') }}"
           class="menu-item {% if request.endpoint == 'settings' %}active{% endif %}">

            <i class="bi bi-gear-fill"></i>

            <span>Settings</span>

        </a>


        <a href="{{ url_for('about') }}"
           class="menu-item {% if request.endpoint == 'about' %}active{% endif %}">

            <i class="bi bi-info-circle-fill"></i>

            <span>About</span>

        </a>

    </div>


    <!-- Sidebar Footer -->
    <div class="sidebar-footer">

        <a href="{{ url_for('profile') }}"
           class="user-card text-decoration-none">

            <div class="avatar">

                {{ current_user.name[0] | upper }}

            </div>

            <div>

                <strong>
                    {{ current_user.name }}
                </strong>

                <br>

                <small>
                    DealHunter User
                </small>

            </div>

        </a>


        <a href="{{ url_for('logout') }}"
           class="logout-btn">

            <i class="bi bi-box-arrow-right"></i>

            Logout

        </a>

    </div>

</div>
