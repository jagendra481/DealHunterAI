<div class="col-xl-4 col-lg-6 mb-4">

    <div class="card product-card h-100 shadow-sm">

        <!-- Product Image -->
        <div class="position-relative">

            <a href="{{ url_for('product_details', product_id=product['id']) }}">

                <img
                    src="{{ product['image'] if product['image'] else 'https://via.placeholder.com/600x400?text=DealHunterAI' }}"
                    class="card-img-top product-image"
                    alt="{{ product['name'] }}">

            </a>

            {% if product["prime"] %}

            <span
                class="badge bg-primary position-absolute top-0 end-0 m-3">

                Prime

            </span>

            {% endif %}

        </div>


        <!-- Card Body -->
        <div class="card-body">

            <a
                href="{{ url_for('product_details', product_id=product['id']) }}"
                class="text-decoration-none text-dark">

                <h5 class="fw-bold mb-3">

                    {{ product["name"] }}

                </h5>

            </a>


            <p class="mb-2">

                <i class="bi bi-star-fill text-warning"></i>

                {{ product["rating"] }}

                <span class="text-muted">

                    ({{ product["reviews"] }} Reviews)

                </span>

            </p>


            <h3 class="fw-bold text-success mb-2">

                ₹ {{ "{:,.0f}".format(product["current_price"] or 0) }}

            </h3>


            <p class="text-muted mb-0">

                <i class="bi bi-box-seam"></i>

                {{ product["availability"] or "Availability unknown" }}

            </p>

        </div>


        <!-- Card Footer -->
        <div class="card-footer bg-white border-0">

            <div class="d-grid gap-2">

                <!-- Amazon Button -->

                <a
                    href="{{ product['affiliate_url'] }}"
                    target="_blank"
                    rel="noopener noreferrer"
                    class="btn btn-warning">

                    <i class="bi bi-cart-fill"></i>

                    Buy on Amazon

                </a>


                <div class="row g-2">

                    <!-- Refresh -->

                    <div class="col-6">

                        <form
                            method="POST"
                            action="{{ url_for('refresh_product', product_id=product['id']) }}">

                            <button
                                type="submit"
                                class="btn btn-outline-primary w-100">

                                <i class="bi bi-arrow-repeat"></i>

                                Refresh

                            </button>

                        </form>

                    </div>


                    <!-- Delete -->

                    <div class="col-6">

                        <form
                            method="POST"
                            action="{{ url_for('delete_product', product_id=product['id']) }}"
                            onsubmit="return confirm('Delete this product?');">

                            <button
                                type="submit"
                                class="btn btn-outline-danger w-100">

                                <i class="bi bi-trash"></i>

                                Delete

                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>
