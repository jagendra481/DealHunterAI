<div class="col-xl-4 col-lg-6 mb-4">

    <div class="card product-card h-100">

        <div class="position-relative">

            <img
                src="{{ product['image'] if product['image'] else 'https://via.placeholder.com/600x400?text=DealHunterAI' }}"
                class="card-img-top product-image">

            {% if product["prime"] %}

            <span class="badge bg-primary position-absolute top-0 end-0 m-3">

                Prime

            </span>

            {% endif %}

        </div>

        <div class="card-body">

            <h5 class="fw-bold">

                {{ product["name"] }}

            </h5>

            <div class="mb-3">

                ⭐ {{ product["rating"] }}

                <span class="text-muted">

                    ({{ product["reviews"] }})

                </span>

            </div>

            <h3 class="fw-bold text-success">

                ₹ {{ "{:,.0f}".format(product["current_price"]) }}

            </h3>

            <small class="text-muted">

                {{ product["availability"] }}

            </small>

        </div>

        <div class="card-footer border-0 bg-white">

            <div class="d-grid gap-2">

                <a
                    href="{{ product['affiliate_url'] }}"
                    target="_blank"
                    class="btn btn-warning">

                    🛒 Buy on Amazon

                </a>

                <div class="row">

                    <div class="col-6">

                        <a
                            href="/refresh-product/{{ product['id'] }}"
                            class="btn btn-outline-primary w-100">

                            Refresh

                        </a>

                    </div>

                    <div class="col-6">

                        <a
                            href="/delete-product/{{ product['id'] }}"
                            class="btn btn-outline-danger w-100"
                            onclick="return confirm('Delete Product?')">

                            Delete

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>
