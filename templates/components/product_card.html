<div class="col-lg-4 col-md-6 mb-4">

    <div class="card product-card h-100 shadow-sm">

        <img
            src="{{ product['image'] if product['image'] else 'https://via.placeholder.com/400x300?text=No+Image' }}"
            class="card-img-top product-image"
            alt="{{ product['name'] }}"
        >

        <div class="card-body">

            <h5 class="card-title">

                {{ product["name"] }}

            </h5>

            <p class="rating">

                ⭐ {{ product["rating"] }}

                <small class="text-muted">

                    ({{ product["reviews"] }} Reviews)

                </small>

            </p>

            <h3 class="price text-success">

                ₹ {{ "{:,.0f}".format(product["current_price"]) }}

            </h3>

            {% if product["prime"] %}

                <span class="badge bg-success">

                    Prime

                </span>

            {% endif %}

            <p class="mt-2 text-muted">

                {{ product["availability"] }}

            </p>

        </div>

        <div class="card-footer bg-white">

            <div class="d-grid gap-2">

                <a
    href="/refresh-product/{{ product['id'] }}"
    class="btn btn-primary">

    <i class="bi bi-arrow-clockwise"></i>

    Refresh

</a>

                <a
                    href="/delete-product/{{ product['id'] }}"
                    class="btn btn-danger"
                    onclick="return confirm('Delete this product?');">

                    🗑 <i class="bi bi-trash"></i>

 🗑 Delete

                </a>

                <a
                    href="{{ product['affiliate_url'] }}"
                    target="_blank"
                    class="btn btn-warning">

                    <i class="bi bi-cart-fill"></i>

 🛒 Buy on Amazon

                </a>

            </div>

        </div>

    </div>

</div>
