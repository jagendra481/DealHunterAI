<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        {% block title %}
        DealHunterAI
        {% endblock %}
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css"
        rel="stylesheet"
    >

    <style>

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;

            background:
                linear-gradient(
                    135deg,
                    #eff6ff,
                    #f8fafc,
                    #eef2ff
                );

            font-family:
                Arial,
                sans-serif;
        }

        .auth-page {
            min-height: 100vh;

            display: flex;
            align-items: center;
            justify-content: center;

            padding: 30px 15px;
        }

        .auth-card {
            width: 100%;
            max-width: 460px;

            background: white;

            border-radius: 24px;

            padding: 40px;

            box-shadow:
                0 20px 50px
                rgba(15, 23, 42, 0.10);
        }

        .brand {
            text-align: center;

            margin-bottom: 30px;
        }

        .brand h2 {
            font-weight: 800;

            color: #111827;

            margin-bottom: 8px;
        }

        .brand p {
            color: #64748b;

            margin: 0;
        }

        .auth-title {
            font-weight: 750;

            color: #111827;
        }

        .auth-subtitle {
            color: #64748b;
        }

        .form-control {
            min-height: 52px;

            border-radius: 12px;

            padding-left: 16px;

            border: 1px solid #dbe2ea;
        }

        .form-control:focus {
            border-color: #2563eb;

            box-shadow:
                0 0 0 4px
                rgba(37, 99, 235, 0.10);
        }

        .auth-btn {
            min-height: 52px;

            border-radius: 12px;

            font-weight: 700;
        }

        .auth-link {
            color: #2563eb;

            font-weight: 600;

            text-decoration: none;
        }

        .auth-link:hover {
            text-decoration: underline;
        }

        .security-text {
            color: #94a3b8;

            font-size: 13px;

            text-align: center;
        }

        @media (max-width: 576px) {

            .auth-card {
                padding: 28px 22px;

                border-radius: 18px;
            }

        }

    </style>

</head>

<body>

<div class="auth-page">

    <div class="auth-card">

        <div class="brand">

            <h2>
                🚀 DealHunterAI
            </h2>

            <p>
                Smarter price tracking.
                Better buying decisions.
            </p>

        </div>


        {% with messages = get_flashed_messages(
            with_categories=true
        ) %}

            {% if messages %}

                {% for category, message in messages %}

                    <div
                        class="alert alert-{{ category }} alert-dismissible fade show"
                    >

                        {{ message }}

                        <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="alert"
                        ></button>

                    </div>

                {% endfor %}

            {% endif %}

        {% endwith %}


        {% block content %}

        {% endblock %}

    </div>

</div>


<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
></script>

</body>

</html>
